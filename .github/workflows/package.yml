name: Package and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  package-macos:
    runs-on: macos-latest

    env:
      PIPENV_VENV_IN_PROJECT: 1
      PIPENV_IGNORE_VIRTUALENVS: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip3 install pipenv
          pipenv install pyqt5==5.15.6 lxml py2app

      - name: Build LabelImg
        run: |
          pipenv run make qt5py3

      - name: Package macOS App
        run: |
          pipenv run python setup.py py2app

      - name: Archive macOS App
        run: |
          cd dist
          tar czf labelImg-macos.tgz labelImg.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-macos
          path: dist/labelImg-macos.tgz

  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyqt5==5.15.6 lxml

      - name: Generate Resources
        run: |
          pyrcc5 -o libs/resources.py resources.qrc

      - name: Build EXE
        run: |
          pyinstaller ^
            --hidden-import=PyQt5 ^
            --hidden-import=lxml ^
            --collect-all PyQt5 ^
            -F ^
            -n labelImg ^
            -c ^
            labelImg.py ^
            -p ./libs ^
            -p ./

      - name: Rename EXE
        run: |
          ren dist\labelImg.exe labelImg-windows.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-windows
          path: dist/labelImg-windows.exe

  package-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyqt5==5.15.6 lxml

      - name: Generate Resources
        run: |
          pyrcc5 -o libs/resources.py resources.qrc

      - name: Build Binary
        run: |
          pyinstaller \
            --hidden-import=PyQt5 \
            --hidden-import=lxml \
            --collect-all PyQt5 \
            -F \
            -n labelImg \
            -c \
            labelImg.py \
            -p ./libs \
            -p ./

      - name: Rename Binary
        run: |
          mv dist/labelImg dist/labelImg-linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-linux
          path: dist/labelImg-linux

  release:
    needs:
      - package-macos
      - package-windows
      - package-linux

    runs-on: ubuntu-latest

    steps:
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: labelimg-macos
          path: artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: labelimg-windows
          path: artifacts

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: labelimg-linux
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/labelImg-macos.tgz
            artifacts/labelImg-windows.exe
            artifacts/labelImg-linux
          generate_release_notes: true