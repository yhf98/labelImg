name: Package and Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  # =========================
  # macOS Intel x86_64
  # =========================
  package-macos-intel:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyqt5==5.15.6 lxml py2app

      - name: Build Resources
        run: |
          pyrcc5 -o libs/resources.py resources.qrc

      - name: Build macOS Intel App
        env:
          ARCHFLAGS: "-arch x86_64"
        run: |
          python setup.py py2app

      - name: Archive Intel App
        run: |
          cd dist
          tar czf labelImg-macos-intel.tgz labelImg.app

      - name: Upload Intel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-macos-intel
          path: dist/labelImg-macos-intel.tgz

  # =========================
  # macOS Apple Silicon ARM64
  # =========================
  package-macos-arm64:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyqt5==5.15.6 lxml py2app

      - name: Build Resources
        run: |
          pyrcc5 -o libs/resources.py resources.qrc

      - name: Build macOS ARM64 App
        env:
          ARCHFLAGS: "-arch arm64"
        run: |
          python setup.py py2app

      - name: Archive ARM64 App
        run: |
          cd dist
          tar czf labelImg-macos-arm64.tgz labelImg.app

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-macos-arm64
          path: dist/labelImg-macos-arm64.tgz

  # =========================
  # Windows x64
  # =========================
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyqt5==5.15.6 lxml

      - name: Build Resources
        run: |
          pyrcc5 -o libs/resources.py resources.qrc

      - name: Build Windows EXE
        shell: cmd
        run: |
          pyinstaller --hidden-import=PyQt5 --hidden-import=lxml --collect-all PyQt5 -F -n labelImg -c labelImg.py -p ./libs -p ./

      - name: Rename EXE
        shell: cmd
        run: |
          ren dist\labelImg.exe labelImg-windows.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-windows
          path: dist/labelImg-windows.exe

  # =========================
  # Linux x64
  # =========================
  package-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyqt5==5.15.6 lxml

      - name: Build Resources
        run: |
          pyrcc5 -o libs/resources.py resources.qrc

      - name: Build Linux Binary
        run: |
          pyinstaller --hidden-import=PyQt5 --hidden-import=lxml --collect-all PyQt5 -F -n labelImg -c labelImg.py -p ./libs -p ./

      - name: Rename Binary
        run: |
          mv dist/labelImg dist/labelImg-linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-linux
          path: dist/labelImg-linux

  # =========================
  # Create GitHub Release
  # =========================
  release:
    needs:
      - package-macos-intel
      - package-macos-arm64
      - package-windows
      - package-linux

    runs-on: ubuntu-latest

    steps:
      - name: Download macOS Intel Artifact
        uses: actions/download-artifact@v4
        with:
          name: labelimg-macos-intel
          path: artifacts

      - name: Download macOS ARM64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: labelimg-macos-arm64
          path: artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: labelimg-windows
          path: artifacts

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: labelimg-linux
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/labelImg-macos-intel.tgz
            artifacts/labelImg-macos-arm64.tgz
            artifacts/labelImg-windows.exe
            artifacts/labelImg-linux